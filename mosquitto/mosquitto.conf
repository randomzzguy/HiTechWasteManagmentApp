# =============================================================
# Mosquitto MQTT Broker Configuration — Mosquitto 2.x
# Hi-Tech Waste Management Platform
# =============================================================

# Persistence
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db
autosave_interval 1800

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
connection_messages true

# -------------------------------------------------------------
# Standard MQTT Listener — Port 1883
# -------------------------------------------------------------
listener 1883 0.0.0.0
protocol mqtt
allow_anonymous true
max_connections -1
max_inflight_messages 20
max_queued_messages 100

# -------------------------------------------------------------
# WebSocket Listener — Port 9001
# -------------------------------------------------------------
listener 9001 0.0.0.0
protocol websockets
allow_anonymous true

# -------------------------------------------------------------
# Topic reference (developer notes)
# fleet/gps/{vehicle_id}     — GPS telemetry
# fleet/status/{vehicle_id}  — Vehicle status
# jobs/update/{job_id}       — Job status events
# alerts/agent/{agent_name}  — AI agent alerts
# weighbridge/record         — Live weighbridge events
# -------------------------------------------------------------
