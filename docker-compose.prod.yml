# =============================================================
# Hi-Tech Waste Management - Production Docker Compose
# Overrides docker-compose.yml for production deployment
# Includes Nginx reverse proxy with SSL/HTTPS
# =============================================================

services:
  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: hitech_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hitech_network

  # Certbot for Let's Encrypt SSL certificates
  certbot:
    image: certbot/certbot:latest
    container_name: hitech_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - hitech_network

  # Remove exposed ports from backend (only accessible via Nginx)
  backend:
    ports: []
    environment:
      - NEXTAUTH_URL=https://your-domain.com
      - BACKEND_URL=https://your-domain.com

  # Remove exposed ports from frontend (only accessible via Nginx)
  frontend:
    ports: []
    environment:
      - NEXTAUTH_URL=https://your-domain.com
      - NEXT_PUBLIC_API_URL=https://your-domain.com
      - NEXT_PUBLIC_WS_URL=wss://your-domain.com

volumes:
  certbot_certs:
    driver: local
  certbot_webroot:
    driver: local

networks:
  hitech_network:
    name: hitech_network
    driver: bridge
